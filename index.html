<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a; /* Dark background to make colors pop */
            color: white;
            text-align: center;
        }
        .card {
            border-radius: 20px;
            padding: 20px;
            border: 4px solid #444;
            background: linear-gradient(145deg, #222, #333);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .aquaflare-theme { border-color: #0077be; box-shadow: 0 0 20px #0077be; }
        .voltice-theme { border-color: #f1c40f; box-shadow: 0 0 20px #f1c40f; }
        
        img { width: 100%; max-width: 300px; border-radius: 10px; }
        .stats { margin-top: 20px; font-size: 1.2rem; }
        .stat-bar { background: #444; height: 10px; border-radius: 5px; margin: 5px 0; }
        .fill { height: 100%; border-radius: 5px; background: #00ff00; }
    </style>
</head>
<body>
    <div class="card aquaflare-theme">
        <h1>AQUAFLARE</h1>
        <img src="aquaflare.png" alt="Aquaflare">
        <div class="stats">
            <p>HP: 85</p> <div class="stat-bar"><div class="fill" style="width: 85%;"></div></div>
            <p>ATK: 110</p> <div class="stat-bar"><div class="fill" style="width: 110px;"></div></div>
        </div>
    </div>
</body>
</html>
