<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dootley-Dex</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #1a1a1a; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: 'Press Start 2P', cursive; 
            overflow: hidden; 
        }

        /* The Container that holds the background image */
        .pokedex-frame { 
            width: 100vw;
            height: 100vh;
            max-width: 500px; /* Adjust based on your image shape */
            max-height: 900px;
            background-image: url('assets/pokedex.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            position: relative;
        }

        /* The Screen: Positioned to fit inside the hole in your PNG */
        .viewport { 
            position: absolute;
            top: 25%; /* Tweak these % to line up with your image */
            left: 12%; 
            width: 76%;
            height: 35%;
            background-color: #98cbff; 
            border: 4px solid #333;
            overflow: hidden;
            display: flex;
        }

        .pages-wrapper { display: flex; height: 100%; transition: transform 0.3s ease-out; }
        .page { min-width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; box-sizing: border-box; color: #222; }
        .page img { width: 140px; height: 140px; margin-bottom: 10px; image-rendering: pixelated; }
        .info-text { font-size: 8px; line-height: 1.4; text-align: center; text-transform: uppercase; }

        /* Navigation Overlay: Invisible buttons over the PNG buttons */
        .nav-overlay {
            position: absolute;
            bottom: 15%; /* Tweak to sit over your image's buttons */
            width: 100%;
            display: flex;
            justify-content: space-around;
        }

        .invisible-btn { 
            background: rgba(0,0,0,0.1); /* Make this 0 to hide completely */
            border: 2px solid #fff; /* Help you see them while positioning */
            width: 80px;
            height: 60px;
            cursor: pointer;
            color: white;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .counter {
            position: absolute;
            top: 62%;
            left: 50%;
            transform: translateX(-50%);
            color: #0f0; /* Retro green */
            font-size: 10px;
            background: #000;
            padding: 5px;
        }
    </style>
</head>
<body>

<div class="pokedex-frame">
    <div class="viewport">
        <div id="slider" class="pages-wrapper"></div>
    </div>

    <div class="counter" id="dex-count">01 / 15</div>

    <div class="nav-overlay">
        <div class="invisible-btn" onclick="move(-1)">PREV</div>
        <div class="invisible-btn" onclick="move(1)">NEXT</div>
    </div>
</div>

<script>
       const pokemon = [
        "Groxim", "Gimox", "Foimer", "Giper", "Gider", "Hydropip", 
        "Flear", "Flamer", "Firarmear", "Bewo", "Flicket", "Aleo", 
        "Aloe", "Alewo", "jelico"
    ];

    const slider = document.getElementById('slider');
    const counter = document.getElementById('dex-count');

    pokemon.forEach((name, index) => {
        const page = document.createElement('div');
        page.className = 'page';
        page.innerHTML = `
            <img src="assets/${name}.png" alt="${name}" onerror="this.src='https://via.placeholder.com/150?text=DATA+MISSING'">
            <div class="info-text">
                NO. ${String(index + 1).padStart(3, '0')}<br>
                ${name}<br>
                ---<br>
                (UNIVERSE: NULL)
            </div>
        `;
        slider.appendChild(page);
    });

    let pos = 0;
    function updateDisplay() {
        slider.style.transform = `translateX(-${pos * 100}%)`;
        counter.innerText = `${String(pos + 1).padStart(2, '0')} / ${pokemon.length}`;
    }

    function move(dir) {
        pos = (pos + dir + pokemon.length) % pokemon.length;
        updateDisplay();
    }
    updateDisplay();
</script>

</body>
</html>
